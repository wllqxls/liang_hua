<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化回测系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.0/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.0/dist/chartjs-adapter-luxon.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 量化回测系统</h1>
            <span class="subtitle">支撑位阻力位突破策略</span>
        </header>

        <!-- 控制面板 -->
        <section class="panel">
            <h2>回测参数</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="symbol">交易对</label>
                    <select id="symbol">
                        {% for s in symbols %}
                        <option value="{{ s }}" {% if s == 'BTC/USDT' %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="timeframe">K 线周期</label>
                    <select id="timeframe">
                        {% for t in timeframes %}
                        <option value="{{ t }}" {% if t == '1h' %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="strategy">策略</label>
                    <select id="strategy">
                        {% for s in strategies %}
                        <option value="{{ s }}">{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="lookback">回溯窗口</label>
                    <input type="number" id="lookback" value="20" min="1" max="500">
                </div>
                <div class="form-group">
                    <label for="cash">初始资金 (USDT)</label>
                    <input type="number" id="cash" value="1000000" min="1000" step="10000">
                </div>
                <div class="form-group">
                    <label for="commission">手续费率</label>
                    <input type="number" id="commission" value="0.001" min="0" max="0.1" step="0.0001">
                </div>
            </div>
            <button id="run-btn" class="btn-primary" onclick="runBacktest()">▶ 开始回测</button>
            <span id="status" class="status-text"></span>
        </section>

        <!-- 数据面板 -->
        <section class="panel">
            <div class="panel-title-row">
                <h2>本地数据</h2>
                <button id="refresh-data-btn" class="btn-secondary" onclick="loadDataStatus()">刷新</button>
            </div>
            <div class="data-actions">
                <div class="form-group compact">
                    <label for="fetch-days">拉取天数</label>
                    <input type="number" id="fetch-days" value="365" min="1" max="3650">
                </div>
                <button id="fetch-data-btn" class="btn-secondary" onclick="fetchSelectedData()">拉取当前交易对数据</button>
                <span id="data-status-text" class="status-text"></span>
            </div>
            <div class="table-container data-table-container">
                <table id="data-status-table">
                    <thead>
                        <tr>
                            <th>交易对</th>
                            <th>K 线周期</th>
                            <th>状态</th>
                            <th>行数</th>
                            <th>大小</th>
                        </tr>
                    </thead>
                    <tbody id="data-status-tbody">
                        <tr><td colspan="5" class="empty-cell">正在读取...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 结果面板 -->
        <section id="results" class="panel hidden">
            <h2>回测结果</h2>

            <!-- 指标卡片 -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <span class="metric-label">总收益率</span>
                    <span id="metric-return" class="metric-value">--</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">胜率</span>
                    <span id="metric-winrate" class="metric-value">--</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">最大回撤</span>
                    <span id="metric-drawdown" class="metric-value">--</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">夏普比率</span>
                    <span id="metric-sharpe" class="metric-value">--</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">交易次数</span>
                    <span id="metric-trades" class="metric-value">--</span>
                </div>
            </div>

            <!-- 权益曲线 -->
            <div class="chart-container">
                <canvas id="equity-chart"></canvas>
            </div>

            <!-- 交易明细 -->
            <h3>交易明细</h3>
            <div class="table-container">
                <table id="trades-table">
                    <thead>
                        <tr>
                            <th>入场时间</th>
                            <th>出场时间</th>
                            <th>入场价</th>
                            <th>出场价</th>
                            <th>盈亏</th>
                            <th>盈亏%</th>
                        </tr>
                    </thead>
                    <tbody id="trades-tbody"></tbody>
                </table>
            </div>

            <!-- 错误信息 -->
            <div id="error-msg" class="error-msg hidden"></div>
        </section>
    </div>

    <script src="/static/js/backtest.js"></script>
</body>
</html>
